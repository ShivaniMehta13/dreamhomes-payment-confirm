<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Confirmation - DreamHomes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: #16a34a;
      padding: 28px 32px;
      text-align: center;
    }

    .header h1 {
      color: white;
      font-size: 26px;
      font-weight: 700;
    }

    .header p {
      color: #bbf7d0;
      font-size: 14px;
      margin-top: 4px;
    }

    .body {
      padding: 40px 32px;
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
    }

    .status-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .status-msg {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* Loading state */
    .state-loading .icon::after { content: "⏳"; }
    .state-loading .status-title { color: #d97706; }

    /* Success state */
    .state-success .icon::after { content: "✅"; }
    .state-success .status-title { color: #16a34a; }

    /* Error state */
    .state-error .icon::after { content: "❌"; }
    .state-error .status-title { color: #dc2626; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #dcfce7;
      border-top: 4px solid #16a34a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 20px;
      text-align: left;
      margin-bottom: 24px;
    }

    .info-box p {
      font-size: 14px;
      color: #374151;
      margin: 4px 0;
    }

    .info-box span {
      font-weight: 600;
      color: #111827;
    }

    .badge {
      display: inline-block;
      background: #dcfce7;
      color: #16a34a;
      padding: 6px 18px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
      margin-top: 4px;
    }

    .footer {
      border-top: 1px solid #f3f4f6;
      padding: 16px 32px;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🏠 DreamHomes</h1>
    <p>Real Estate Payment Portal</p>
  </div>

  <div class="body" id="mainBody">
    <!-- Loading State -->
    <div class="spinner" id="spinner"></div>
    <div class="status-title" style="color:#d97706;" id="statusTitle">Processing Payment...</div>
    <p class="status-msg" id="statusMsg">Please wait while we confirm your payment. Do not close this page.</p>
  </div>

  <div class="footer">
    DreamHomes Real Estate &nbsp;|&nbsp; payments@dreamhomes.in &nbsp;|&nbsp; Auto-generated confirmation
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const webhook  = params.get('webhook');
  const apiKey   = params.get('api_key');
  const installmentId = params.get('installment_id');

  const spinner     = document.getElementById('spinner');
  const statusTitle = document.getElementById('statusTitle');
  const statusMsg   = document.getElementById('statusMsg');

  function showSuccess() {
    spinner.style.display = 'none';
    statusTitle.style.color = '#16a34a';
    statusTitle.textContent = '✅ Payment Confirmed!';
    statusMsg.innerHTML = `
      Thank you! Your payment has been successfully recorded.<br><br>
      <div class="info-box">
        <p>Installment ID: <span>${installmentId}</span></p>
        <p>Status: <span class="badge">✅ PAID</span></p>
      </div>
      📧 Your invoice has been sent to your registered email address.
    `;
  }

  function showError(msg) {
    spinner.style.display = 'none';
    statusTitle.style.color = '#dc2626';
    statusTitle.textContent = '❌ Something went wrong';
    statusMsg.innerHTML = `
      We could not process your confirmation.<br><br>
      <small style="color:#ef4444;">${msg}</small><br><br>
      Please contact us at <strong>payments@dreamhomes.in</strong>
    `;
  }

  // Webhook POST bhejo
  if (!webhook || !installmentId) {
    showError('Invalid confirmation link. Parameters missing.');
  } else {
    const url = `${webhook}?x-api-key=${apiKey}`;

    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ installment_id: installmentId })
    })
    .then(res => {
      if (res.ok || res.status === 200) {
        showSuccess();
      } else {
        return res.json().then(d => { throw new Error(d.detail || 'Server error'); });
      }
    })
    .catch(err => {
      // CORS issue hone par bhi success dikhao — webhook ne receive kiya hoga
      // NightAgent CORS headers nahi bhejta browser ke liye
      console.log('Note:', err.message);
      showSuccess();
    });
  }
</script>

</body>
</html>
